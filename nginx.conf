server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static multi-page site: serve files, fall through to directory index
    # (so /gallery -> /gallery/index.html). No SPA fallback needed.
    location / {
        try_files $uri $uri/ =404;
    }

    # Vite emits content-hashed asset filenames — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
