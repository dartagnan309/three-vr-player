<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>three-vr-player — gallery</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #0b0d10; color: #e8eaed;
      font: 15px/1.5 system-ui, "Segoe UI", Roboto, sans-serif; }
    .top { display: flex; align-items: baseline; gap: 14px; padding: 20px 26px 6px; }
    .top h1 { margin: 0; font-size: 19px; font-weight: 650; letter-spacing: .2px; }
    .top .muted { color: #8b93a3; font-size: 13px; }
    .top a { margin-left: auto; color: #8ab4ff; text-decoration: none; font-size: 13px; }
    .top a:hover { text-decoration: underline; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 24px;
      padding: 14px 26px 48px; max-width: 960px; margin: 0 auto; }
    .card { position: relative; border-radius: 14px; overflow: hidden; background: #141720;
      border: 1px solid #232833; }
    .stage { position: relative; aspect-ratio: 16 / 9; background: #000; }
    .poster { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }

    /* the whole poster is the play target; the icon sits in the middle */
    .play { position: absolute; inset: 0; display: grid; place-items: center; padding: 0; border: 0;
      background: linear-gradient(transparent 45%, #0007); cursor: pointer; }
    .play svg { width: 72px; height: 72px; opacity: .95; filter: drop-shadow(0 2px 10px #000b);
      transition: transform .15s ease, opacity .15s ease; }
    .card:hover .play svg { transform: scale(1.09); opacity: 1; }

    .spinner { display: none; position: absolute; top: 50%; left: 50%; width: 42px; height: 42px;
      margin: -21px 0 0 -21px; border-radius: 50%; border: 3px solid #ffffff33; border-top-color: #fff;
      animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .close { display: none; }
    .card.loading .play { display: none; }
    .card.loading .poster { filter: brightness(.45); }
    .card.loading .spinner { display: block; }
    .card.playing .poster, .card.playing .play, .card.playing .spinner { display: none; }
    .card.playing .close, .card.loading .close { position: absolute; top: 10px; right: 10px; z-index: 10;
      display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; border: 0;
      background: #000a; color: #fff; font-size: 16px; line-height: 1; cursor: pointer; }
    .card.playing .close:hover, .card.loading .close:hover { background: #000d; }

    .meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 14px; }
    .meta .title { font-weight: 600; }
    .meta .sub { color: #8b93a3; font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <header class="top">
    <h1>three-vr-player</h1>
    <span class="muted">gallery</span>
    <a href="/">URL player →</a>
  </header>
  <main class="grid" id="grid"></main>
  <script type="module" src="./gallery.ts"></script>
</body>
</html>
